services:
  app:
    build:
      context: .
      target: dev
    container_name: ai-mindly
    ports:
      - '3000:3000'
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ai_mindly
    command: sh -c "bunx prisma migrate deploy && bun run dev"
    networks:
      - shared-net

networks:
  shared-net:
    external: true
